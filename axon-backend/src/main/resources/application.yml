# src/main/resources/application.yml
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/axon
    username: ${DB_USER:axon}
    password: ${DB_PASSWORD:axon}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: axon-files

jwt:
  secret: ${JWT_SECRET:dev-secret-key-32-chars-minimum!!-axon-project}
  access-token-ttl: 900
  refresh-token-ttl: 604800

agent-builder:
  base-url: ${AGENT_BUILDER_URL:http://localhost:9090}
  api-key: ${AGENT_BUILDER_API_KEY:dev-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info
