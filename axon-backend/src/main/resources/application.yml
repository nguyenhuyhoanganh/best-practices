spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/axon
    username: ${DB_USER:axon}
    password: ${DB_PASSWORD:axon_dev}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  async:
    executor:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 100

storage:
  volume-base-path: ${STORAGE_BASE_PATH:/app/uploads}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-256-bits-long-axon-project-2026}
  access-token-ttl: 900      # 15 minutes (P11 will change to 1800 = 30 min)
  refresh-token-ttl: 604800  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

notification:
  email:
    from: ${NOTIFICATION_FROM:axon@company.internal}
